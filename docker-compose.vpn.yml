# VPN overlay: routes jdownloader AND orchestrator through gluetun (PIA).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vpn.yml --profile vpn up -d
services:
  jdownloader:
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    # Base compose publishes JD2 ports; must clear when sharing gluetun's network stack.
    ports: !override []

  gluetun:
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
      - "${JD2_WEBUI_PORT:-5800}:5800"
      - "${JD2_API_PORT:-3128}:3128"
    environment:
      SERVER_REGIONS: ${PIA_SERVER_REGIONS:-${PIA_SERVER_REGION:-Netherlands}}
      HTTP_CONTROL_SERVER_ADDRESS: :8000
      FIREWALL_OUTBOUND_SUBNETS: ${VPN_LAN_SUBNET:-172.16.0.0/12}

  orchestrator:
    network_mode: "service:gluetun"
    ports: !override []
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      # Shared network stack with jdownloader on gluetun
      JD2_HOST: 127.0.0.1
      GLUETUN_CONTROL_URL: http://127.0.0.1:8000
      VPN_ENABLED: "true"
