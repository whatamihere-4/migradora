services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: migradora-orchestrator
    env_file: .env
    environment:
      DOWNLOAD_DIR: /data/downloads
      WEBUI_PORT: ${WEBUI_PORT:-8080}
    ports:
      - "${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080}"
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/logs:/data/logs
      - ./config/filester-folders.json:/data/state/filester-folders.json:ro
      - ./shared/src:/app/shared/src:ro
      - ./orchestrator/src:/app/orchestrator/src:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${WEBUI_PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
