services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: migradora-orchestrator
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/logs:/data/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  downloader:
    build:
      context: .
      dockerfile: downloader/Dockerfile
    container_name: migradora-downloader
    env_file: .env
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/logs:/data/logs
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_started

  uploader:
    build:
      context: .
      dockerfile: uploader/Dockerfile
    container_name: migradora-uploader
    env_file: .env
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/logs:/data/logs
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_started

  # Optional PIA VPN — route downloader/uploader through VPN:
  #   docker compose -f docker-compose.yml -f docker-compose.vpn.yml --profile vpn up -d
  gluetun:
    profiles: ["vpn"]
    image: qmcgaw/gluetun:latest
    container_name: migradora-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: .env
    environment:
      VPN_SERVICE_PROVIDER: private internet access
      OPENVPN_USER: ${PIA_OPENVPN_USER}
      OPENVPN_PASSWORD: ${PIA_OPENVPN_PASSWORD}
      SERVER_REGIONS: ${PIA_SERVER_REGION:-Netherlands}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/gluetun:/gluetun
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://api.ipify.org >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
