services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: migradora-orchestrator
    env_file: .env
    environment:
      DOWNLOAD_DIR: /data/downloads
    ports:
      - "${WEBUI_PORT:-${DASHBOARD_PORT:-8080}}:${WEBUI_PORT:-${DASHBOARD_PORT:-8080}}"
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/logs:/data/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${WEBUI_PORT:-${DASHBOARD_PORT:-8080}}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
