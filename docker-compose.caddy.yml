# Optional — attach to external Caddy network (not required).
# Usage: docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
services:
  orchestrator:
    networks:
      - default
      - caddy_net
    ports: !override
      - "127.0.0.1:${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080}"

networks:
  caddy_net:
    external: true
